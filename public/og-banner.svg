<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050505"/>
      <stop offset="100%" stop-color="#0a1109"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c19a6b" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#c19a6b" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Tactical grid -->
  <g stroke="#1a2416" stroke-width="1" opacity="0.6">
    <line x1="0" y1="0" x2="0" y2="630"/>
    <line x1="100" y1="0" x2="100" y2="630"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="500" y1="0" x2="500" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="700" y1="0" x2="700" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="1100" y1="0" x2="1100" y2="630"/>
    <line x1="1200" y1="0" x2="1200" y2="630"/>
    <line x1="0" y1="63" x2="1200" y2="63"/>
    <line x1="0" y1="126" x2="1200" y2="126"/>
    <line x1="0" y1="189" x2="1200" y2="189"/>
    <line x1="0" y1="252" x2="1200" y2="252"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="378" x2="1200" y2="378"/>
    <line x1="0" y1="441" x2="1200" y2="441"/>
    <line x1="0" y1="504" x2="1200" y2="504"/>
    <line x1="0" y1="567" x2="1200" y2="567"/>
    <line x1="0" y1="630" x2="1200" y2="630"/>
  </g>

  <!-- Amber top glow bar -->
  <rect x="0" y="0" width="1200" height="200" fill="url(#glow)"/>

  <!-- Top border line (amber) -->
  <rect x="0" y="0" width="1200" height="3" fill="#c19a6b" opacity="0.7"/>

  <!-- Corner brackets — top left -->
  <rect x="40" y="40" width="40" height="3" fill="#c19a6b" opacity="0.8"/>
  <rect x="40" y="40" width="3" height="40" fill="#c19a6b" opacity="0.8"/>

  <!-- Corner brackets — top right -->
  <rect x="1120" y="40" width="40" height="3" fill="#c19a6b" opacity="0.8"/>
  <rect x="1157" y="40" width="3" height="40" fill="#c19a6b" opacity="0.8"/>

  <!-- Corner brackets — bottom left -->
  <rect x="40" y="587" width="40" height="3" fill="#c19a6b" opacity="0.8"/>
  <rect x="40" y="550" width="3" height="40" fill="#c19a6b" opacity="0.8"/>

  <!-- Corner brackets — bottom right -->
  <rect x="1120" y="587" width="40" height="3" fill="#c19a6b" opacity="0.8"/>
  <rect x="1157" y="550" width="3" height="40" fill="#c19a6b" opacity="0.8"/>

  <!-- ETM Logo placeholder (circle with cross) -->
  <circle cx="600" cy="200" r="60" fill="none" stroke="#c19a6b" stroke-width="2" opacity="0.6"/>
  <circle cx="600" cy="200" r="50" fill="#0a0f0a" stroke="#c19a6b" stroke-width="1" opacity="0.4"/>
  <line x1="600" y1="140" x2="600" y2="260" stroke="#c19a6b" stroke-width="1.5" opacity="0.7"/>
  <line x1="540" y1="200" x2="660" y2="200" stroke="#c19a6b" stroke-width="1.5" opacity="0.7"/>
  <circle cx="600" cy="200" r="8" fill="#c19a6b" opacity="0.8"/>

  <!-- CLASSIFIED stamp — subtle -->
  <text x="600" y="170" text-anchor="middle" font-family="monospace" font-size="10" fill="#c19a6b" opacity="0.4" letter-spacing="6">CLASSIFIED LEVEL 5</text>

  <!-- Main Title -->
  <text x="600" y="310" text-anchor="middle" font-family="'Courier New', monospace" font-size="62" font-weight="900" fill="#ffffff" letter-spacing="4">END TIMES MONITOR</text>

  <!-- Subtitle line -->
  <rect x="200" y="328" width="800" height="1" fill="#c19a6b" opacity="0.4"/>
  <text x="600" y="360" text-anchor="middle" font-family="monospace" font-size="18" fill="#c19a6b" opacity="0.9" letter-spacing="8">GLOBAL INTELLIGENCE PLATFORM</text>

  <!-- Tag line -->
  <text x="600" y="410" text-anchor="middle" font-family="monospace" font-size="14" fill="#6b7280" letter-spacing="3">OSINT · PROPHECY · SITUATIONAL AWARENESS · LIVE MAP</text>

  <!-- Status indicators row -->
  <g transform="translate(600, 480)">
    <!-- Omega indicator -->
    <rect x="-260" y="-16" width="140" height="32" rx="2" fill="#0d1710" stroke="#374151" stroke-width="1"/>
    <text x="-190" y="6" text-anchor="middle" font-family="monospace" font-size="13" fill="#facc15" letter-spacing="2">Ω BIRTH PANGS</text>

    <!-- Divider -->
    <rect x="-104" y="-12" width="1" height="24" fill="#374151"/>

    <!-- DEFCON indicator -->
    <rect x="-95" y="-16" width="120" height="32" rx="2" fill="#0d1710" stroke="#374151" stroke-width="1"/>
    <text x="-35" y="6" text-anchor="middle" font-family="monospace" font-size="13" fill="#facc15" letter-spacing="2">DEFCON 3</text>

    <!-- Divider -->
    <rect x="35" y="-12" width="1" height="24" fill="#374151"/>

    <!-- Live dot -->
    <circle cx="55" cy="0" r="5" fill="#ef4444" opacity="0.9"/>
    <text x="75" y="6" font-family="monospace" font-size="13" fill="#9ca3af" letter-spacing="2">LIVE</text>
  </g>

  <!-- URL -->
  <text x="600" y="570" text-anchor="middle" font-family="monospace" font-size="13" fill="#4b5563" letter-spacing="4">ENDTIMES.LIVE</text>

  <!-- Bottom border -->
  <rect x="0" y="627" width="1200" height="3" fill="#c19a6b" opacity="0.4"/>
</svg>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>End Times Monitor - Global Intelligence Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;600;800&display=swap"
    rel="stylesheet">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;600;800&display=swap"
    rel="stylesheet">

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0a0f0d">

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('✅ Service Worker registered:', reg.scope))
          .catch(err => console.error('❌ SW registration failed:', err));
      });
    }
  </script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            mono: ['"Share Tech Mono"', 'monospace'],
            sans: ['"Inter"', 'sans-serif'],
          },
          colors: {
            tactical: {
              900: '#1a1614', // Desert night - almost black with brown tint
              800: '#2d2520', // Dark desert
              700: '#3d342d', // Medium desert brown
              500: '#c19a6b', // Desert tan - PRIMARY (replaces green)
              alert: '#dc2626', // Red (keep)
              warn: '#ea580c', // Amber (keep)
            }
          },
          animation: {
            'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'radar-scan': 'spin 4s linear infinite',
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #050505;
      color: #e5e7eb;
      margin: 0;
      padding: 0;
      overflow: hidden;
      /* Prevent body scroll */
    }

    /* Custom Scrollbar for tactical feel */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #0a0f0d;
    }

    ::-webkit-scrollbar-thumb {
      background: #1a241f;
      border: 1px solid #000;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #34d399;
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }

    /* Leaflet Popup Customization override */
    .leaflet-popup-content-wrapper {
      background: rgba(5, 5, 5, 0.95) !important;
      color: #e5e7eb !important;
      border: 1px solid #c19a6b !important;
      border-radius: 2px !important;
      font-family: 'Share Tech Mono', monospace !important;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.8) !important;
      backdrop-filter: blur(8px);
    }

    /* Recent Event Glow (Subtle, slow pulse) */
    @keyframes glow-pulse {
      0% { filter: drop-shadow(0 0 0px rgba(255, 255, 255, 0)); }
      50% { filter: drop-shadow(0 0 6px rgba(255, 255, 255, 0.8)); }
      100% { filter: drop-shadow(0 0 0px rgba(255, 255, 255, 0)); }
    }

    .recent-event-glow {
      animation: glow-pulse 3s infinite ease-in-out;
      z-index: 900 !important; 
    }

    .leaflet-popup-tip {
      background: #050505 !important;
      border: 1px solid #c19a6b !important;
    }

    .leaflet-container {
      background: #050505;
    }

    /* Marker Cluster Customization - Desert Theme */
    .marker-cluster-small,
    .marker-cluster-medium,
    .marker-cluster-large {
      background-color: rgba(26, 22, 20, 0.9) !important;
      /* Desert night */
      border: 1px solid #c19a6b;
      /* Desert tan */
      border-radius: 50%;
      color: #c19a6b;
      /* Desert tan text */
      font-family: 'Share Tech Mono', monospace;
      font-weight: bold;
    }

    .marker-cluster div {
      background-color: rgba(193, 154, 107, 0.3) !important;
      /* Tan with transparency */
      color: #fff;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "d3": "https://esm.sh/d3@^7.9.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "recharts": "https://esm.sh/recharts@^3.6.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "leaflet": "https://esm.sh/leaflet@1.9.4"
  }
}
</script>
</head>

<body>
  <div id="root" class="h-screen w-screen"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>

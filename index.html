<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>End Times Monitor - Global Intelligence Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;600;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <!-- Marker Cluster Assets -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
  <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            mono: ['"Share Tech Mono"', 'monospace'],
            sans: ['"Inter"', 'sans-serif'],
          },
          colors: {
            tactical: {
              900: '#0a0f0d',
              800: '#111814',
              700: '#1a241f',
              500: '#34d399', // Green accent
              alert: '#ef4444', // Red
              warn: '#f59e0b', // Amber
            }
          },
          animation: {
            'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'radar-scan': 'spin 4s linear infinite',
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #050505;
      color: #e5e7eb;
      margin: 0;
      padding: 0;
      overflow: hidden;
      /* Prevent body scroll */
    }

    /* Custom Scrollbar for tactical feel */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #0a0f0d;
    }

    ::-webkit-scrollbar-thumb {
      background: #1a241f;
      border: 1px solid #000;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #34d399;
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }

    /* Leaflet Popup Customization */
    .leaflet-popup-content-wrapper {
      background: #111814;
      color: #e5e7eb;
      border: 1px solid #34d399;
      border-radius: 4px;
      font-family: 'Share Tech Mono', monospace;
    }

    .leaflet-popup-tip {
      background: #111814;
      border: 1px solid #34d399;
    }

    .leaflet-container {
      background: #050505;
    }

    /* Marker Cluster Customization */
    .marker-cluster-small,
    .marker-cluster-medium,
    .marker-cluster-large {
      background-color: rgba(10, 15, 13, 0.8) !important;
      border: 1px solid #34d399;
      border-radius: 50%;
      color: #34d399;
      font-family: 'Share Tech Mono', monospace;
      font-weight: bold;
    }

    .marker-cluster div {
      background-color: rgba(52, 211, 153, 0.3) !important;
      color: #fff;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "d3": "https://esm.sh/d3@^7.9.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "recharts": "https://esm.sh/recharts@^3.6.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "leaflet": "https://esm.sh/leaflet@1.9.4"
  }
}
</script>
</head>

<body>
  <div id="root" class="h-screen w-screen"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
